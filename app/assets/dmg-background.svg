<?xml version="1.0" encoding="UTF-8"?>
<!--
  Designed for a 1200x800 DMG background image.
  ViewBox is 1200x1200 to match qlmanage's square thumbnail output.
  All meaningful content lives in the vertical band y=200..1000 so that
  a center crop to 1200x800 preserves the entire layout.
  See scripts/build-dmg-background.sh for the conversion pipeline.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="16%" stop-color="#EEF3FA"/>
      <stop offset="80%" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="1200" fill="url(#bg)"/>

  <ellipse cx="600" cy="40" rx="900" ry="320" fill="#204A7B" opacity="0.05"/>

  <text x="600" y="320"
        text-anchor="middle"
        font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="44"
        font-weight="600"
        fill="#1F2933"
        letter-spacing="0.5">DReaction</text>

  <text x="600" y="358"
        text-anchor="middle"
        font-family="-apple-system, 'SF Pro Text', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="17"
        font-weight="400"
        fill="#5A6877">Drag the app into the Applications folder to install</text>

  <g transform="translate(600 660)">
    <path d="M -90 -14 L 50 -14 L 50 -36 L 110 0 L 50 36 L 50 14 L -90 14 Z"
          fill="#204A7B"
          opacity="0.92"/>
  </g>

  <text x="600" y="960"
        text-anchor="middle"
        font-family="-apple-system, 'SF Pro Text', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="12"
        font-weight="400"
        fill="#A3AEBE"
        letter-spacing="1">com.moonrailgun.dreaction</text>
</svg>
